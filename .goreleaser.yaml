version: 2
project_name: outlook-agent

builds:
  - id: outlook-agent
    main: ./cmd/outlook-agent
    binary: outlook-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/johnkil/outlook-agent/internal/buildinfo.Version={{ .Tag }}
      - -X github.com/johnkil/outlook-agent/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/johnkil/outlook-agent/internal/buildinfo.Date={{ .Date }}
      - -X github.com/johnkil/outlook-agent/internal/buildinfo.Dirty={{ .IsGitDirty }}
      - -X github.com/johnkil/outlook-agent/internal/buildinfo.BuiltBy=goreleaser

archives:
  - id: outlook-agent
    ids:
      - outlook-agent
    name_template: "outlook-agent_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: README.md
      - src: docs/RELEASE.md
        strip_parent: true

checksum:
  name_template: SHA256SUMS.txt

snapshot:
  version_template: "{{ .Tag }}"

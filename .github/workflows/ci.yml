name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Build
        run: go build -o /tmp/outlook-agent-build-check ./cmd/outlook-agent

      - name: Git whitespace check
        run: git diff --check

      - name: Public safety check
        run: scripts/public-safety-check.sh

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

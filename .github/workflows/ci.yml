name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Build
        run: go build -o /tmp/outlook-agent-build-check ./cmd/outlook-agent

      - name: Git whitespace check
        run: git diff --check

      - name: Public safety check
        run: scripts/public-safety-check.sh

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

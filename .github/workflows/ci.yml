name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        run: go build -o /tmp/outlook-agent-build-check ./cmd/outlook-agent

      - name: Git whitespace check
        run: git diff --check

      - name: Public safety check
        run: scripts/public-safety-check.sh

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
